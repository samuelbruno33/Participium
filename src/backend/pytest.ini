[pytest]
pythonpath = .
testpaths = tests
junit_family = xunit2
addopts = --strict-markers --cov --cov-branch
markers =
    blackbox: black-box tests and drafts under tests/blackbox.
    whitebox: white-box tests and drafts under tests/whitebox.
    unit: unit tests and drafts under tests/unit.
    integration: integration tests under tests/integration.
    e2e: end-to-end tests under tests/e2e.
    implementation_bug(reason): documents an implementation bug revealed by a failing test
filterwarnings =
    ignore::DeprecationWarning