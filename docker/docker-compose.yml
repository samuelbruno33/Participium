x-db-credentials: &db-credentials
  MYSQL_DATABASE: &db-name participium
  MYSQL_USER: &db-user participium
  MYSQL_PASSWORD: &db-password participium_password

x-ports: &backend-port "5050"
x-frontend-port: &frontend-port "5173"
x-db-port: &db-port "3306"

services:
  database:
    image: mysql:8

    environment:
          MYSQL_ROOT_PASSWORD: root
          <<: *db-credentials

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysql -h 127.0.0.1 -uparticipium -pparticipium_password participium -e 'SELECT 1'"
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile

    ports:
      - "5050:5050"

    environment:
      DATABASE_URL: mysql+pymysql://participium:participium_password@database:3306/participium?autocommit=true
      AUTO_INIT_DB: "true"
      BOOTSTRAP_REFERENCE_DATA: "true"
      BOOTSTRAP_DEMO_DATA: "true"
      FRONTEND_ORIGIN: http://localhost:5173
    
    volumes:
        - ../src/backend:/usr/src/app
        - backend_instance:/usr/src/app/instance
        - backend_media:/usr/src/app/media

    depends_on:
      database:
        condition: service_healthy
  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile

    ports:
      - "5173:5173"

    environment:
      - VITE_API_BASE_URL=http://localhost:5050/api/v1
      - VITE_BACKEND_BASE_URL=http://localhost:5050
    
    volumes:
          - ../src/frontend:/usr/src/app
          - frontend_node_modules:/usr/src/app/node_modules

    depends_on:
      backend:
        condition: service_started

volumes:
  mysql_data:
  backend_instance:
  backend_media:
  frontend_node_modules: